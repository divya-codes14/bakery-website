<!DOCTYPE html>
<html>
<head>
  <title>Order Success</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;

      background: #8b5a3c;
    }

    /* DARK OVERLAY */
    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: rgba(0, 0, 0, 0.6);
    }

    /* BOX */
    .box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      text-align: center;

      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      color: #222;
      font-size: 30px;
    }

    p {
      color: #555;
      margin-top: 10px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;

      background:#e63950;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #e63950;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="box">
    <h1>🎉 Order Placed!</h1>
    <p>Your order is being prepared 🍰</p>

    <button onclick="window.location.href='index.html'">
      Go Home
    </button>
  </div>
</div>

</body>
</html>
